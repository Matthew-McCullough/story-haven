<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="parchment" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#f4f1e8;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#e8dcc6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c5a9;stop-opacity:1" />
    </radialGradient>
    <filter id="aging">
      <feTurbulence baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 .5 0 1 0 1 0 .5 0"/>
      </feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Base parchment -->
  <rect width="100%" height="100%" fill="url(#parchment)"/>
  
  <!-- Aged texture -->
  <rect width="100%" height="100%" fill="#d4af8c" opacity="0.1" filter="url(#aging)"/>
  
  <!-- Scroll curls -->
  <path d="M0,0 Q100,50 0,100 Z" fill="#c9a876" opacity="0.3"/>
  <path d="M1920,0 Q1820,50 1920,100 Z" fill="#c9a876" opacity="0.3"/>
  
  <!-- Age spots -->
  <circle cx="300" cy="200" r="20" fill="#b8956f" opacity="0.2"/>
  <circle cx="1600" cy="800" r="35" fill="#b8956f" opacity="0.15"/>
  <circle cx="800" cy="400" r="15" fill="#a67c4a" opacity="0.3"/>
  <circle cx="1200" cy="600" r="25" fill="#a67c4a" opacity="0.2"/>
  
  <!-- Text placeholder -->
  <text x="960" y="540" font-family="serif" font-size="48" text-anchor="middle" fill="#8b5a2b" opacity="0.3">Ancient Scroll Background</text>
</svg>